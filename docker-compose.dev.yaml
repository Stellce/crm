name: crm-dev

services:
  db:
    image: mcr.microsoft.com/mssql/server:2025-CU5-ubuntu-24.04
    container_name: crm-db-dev
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}      
    ports:
      - "14333:1433"
    volumes:
      - sqlserver_dev_data:/var/opt/mssql

  mailpit:
    image: axllent/mailpit:v1.30
    container_name: crm-mailpit-dev
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  sqlserver_dev_data: